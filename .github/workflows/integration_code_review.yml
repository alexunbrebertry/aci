name: Integration PR Review
jobs:
  integration-pr-review:
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-98b8
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changed files
      id: changed-files
      run: '# Execute the script and redirect its output to $GITHUB_OUTPUT

        bash .github/scripts/integration_detect_changed_files.sh "${{ github.event.pull_request.base.sha
        }}" "${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT

        '
    - name: GARALT debug probe
      run: 'GARALT_DBG_TITLE=''${{ toJSON(github.event.pull_request.title) }}''

        GARALT_DBG_BODY=''${{ toJSON(github.event.pull_request.body) }}''

        printf ''GARALT_DBG: title=%s\n'' "$GARALT_DBG_TITLE"

        printf ''GARALT_DBG: body=%s\n'' "$GARALT_DBG_BODY"

        printf ''GARALT_DBG: about-to-inject-title-body-into-shell-run-block\n'''
    - name: Get PR title and body
      id: pr-info
      if: steps.changed-files.outputs.skip != 'true'
      run: 'echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT

        echo "body<<BODY_DELIMITER" >> $GITHUB_OUTPUT

        echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT

        echo "BODY_DELIMITER" >> $GITHUB_OUTPUT

        '
    - name: Generate file content for Claude
      id: file-content
      if: steps.changed-files.outputs.skip != 'true'
      run: '# Generate PR content using our script

        bash .github/scripts/integration_generate_pr_content.sh "${{ steps.pr-info.outputs.title
        }}" "${{ steps.pr-info.outputs.body }}" "${{ steps.changed-files.outputs.changed_files
        }}" "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha
        }}"

        '
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Run Claude Code Review
      id: claude-review
      if: steps.changed-files.outputs.skip != 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: '# Install the Anthropic CLI

        pip install anthropic


        # Run our Python script

        python .github/scripts/integration_pr_review.py

        '
    - name: Read Review and Post Comment
      uses: actions/github-script@v7
      if: steps.changed-files.outputs.skip != 'true'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "const fs = require('fs');\n\n// Read review from file\nlet review\
          \ = '';\ntry {\n  review = fs.readFileSync('claude_review.md', 'utf8');\n\
          \  console.log('Successfully read review file');\n} catch (error) {\n  console.error('Error\
          \ reading review file:', error);\n  review = 'Error: Could not read review\
          \ content.';\n}\n\n// Post review as comment\ntry {\n  const commentPrefix\
          \ = 'ACI Integration Code Review (Sonnet 3.7)';\n  const timestamp = new\
          \ Date().toISOString().replace('T', ' ').replace('Z', '');\n  const commentBody\
          \ = `## ${commentPrefix} - ${timestamp}\\n\\nThis review analyzes changes\
          \ to integration files in the app/ directories.\\n\\n${review}`;\n  console.log('Comment\
          \ body:', commentBody);\n  await github.rest.issues.createComment({\n  \
          \  owner: context.repo.owner,\n    repo: context.repo.repo,\n    issue_number:\
          \ context.issue.number,\n    body: commentBody\n  });\n  console.log('Posted\
          \ integration review comment to PR');\n} catch (error) {\n  console.error('Error\
          \ posting review comment:', error);\n}\n"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - apps/**
