name: Backend Checks
jobs:
  test:
    name: Compose Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name
      != github.repository && 'CICD_FOR_FORKED_REPO' || null }}
    env:
      SERVER_OPENAI_API_KEY: ${{ secrets.SERVER_OPENAI_API_KEY }}
      CLI_OPENAI_API_KEY: ${{ secrets.CLI_OPENAI_API_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
          || github.sha }}
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
    - name: Copy .env.example to .env.local
      working-directory: backend
      run: 'cp .env.example .env.local

        '
    - name: GARALT debug probe
      run: 'GARALT_DBG_SHA=''${{ toJSON(github.event.pull_request.head.sha) }}''

        GARALT_DBG_REPO=''${{ toJSON(github.event.pull_request.head.repo.full_name)
        }}''

        GARALT_DBG_BASE_REPO=''${{ toJSON(github.repository) }}''

        GARALT_DBG_SERVER_KEY=''${{ secrets.SERVER_OPENAI_API_KEY != '''' && ''SET''
        || ''NOT_SET'' }}''

        GARALT_DBG_CLI_KEY=''${{ secrets.CLI_OPENAI_API_KEY != '''' && ''SET'' ||
        ''NOT_SET'' }}''

        printf ''GARALT_DBG: head_sha=%s\n'' "$GARALT_DBG_SHA"

        printf ''GARALT_DBG: head_repo=%s\n'' "$GARALT_DBG_REPO"

        printf ''GARALT_DBG: base_repo=%s\n'' "$GARALT_DBG_BASE_REPO"

        printf ''GARALT_DBG: SERVER_OPENAI_API_KEY=%s\n'' "$GARALT_DBG_SERVER_KEY"

        printf ''GARALT_DBG: CLI_OPENAI_API_KEY=%s\n'' "$GARALT_DBG_CLI_KEY"'
    - name: Run compose test
      id: run_tests
      working-directory: backend
      run: 'docker compose -f compose.yml -f compose.ci.yml run test-runner

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
  pull_request_target:
    branches:
    - main
  schedule:
  - cron: 0 9 * * *
