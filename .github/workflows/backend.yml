name: Backend Checks
jobs:
  test:
    name: Compose Tests
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-ad3a
    timeout-minutes: 30
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name
      != github.repository && 'CICD_FOR_FORKED_REPO' || null }}
    env:
      SERVER_OPENAI_API_KEY: ${{ secrets.SERVER_OPENAI_API_KEY }}
      CLI_OPENAI_API_KEY: ${{ secrets.CLI_OPENAI_API_KEY }}
    steps:
    - name: GARALT debug probe
      run: 'GARALT_DBG_EVENT=''${{ toJSON(github.event_name) }}''

        GARALT_DBG_SHA=''${{ toJSON(github.event.pull_request.head.sha) }}''

        GARALT_DBG_REPO=''${{ toJSON(github.event.pull_request.head.repo.full_name)
        }}''

        GARALT_DBG_BASE=''${{ toJSON(github.repository) }}''

        printf ''GARALT_DBG: event=%s\n'' "$GARALT_DBG_EVENT"

        printf ''GARALT_DBG: head.sha=%s\n'' "$GARALT_DBG_SHA"

        printf ''GARALT_DBG: head.repo=%s\n'' "$GARALT_DBG_REPO"

        printf ''GARALT_DBG: base.repo=%s\n'' "$GARALT_DBG_BASE"'
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
          || github.sha }}
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
    - name: Copy .env.example to .env.local
      working-directory: backend
      run: 'cp .env.example .env.local

        '
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: === Pre-sink dump ===\n''

        printf ''GARALT_DBG: compose.ci.yml:\n''

        cat compose.ci.yml 2>/dev/null || printf ''GARALT_DBG: (no compose.ci.yml)\n''

        printf ''GARALT_DBG: Dockerfile.runner:\n''

        cat Dockerfile.runner 2>/dev/null || printf ''GARALT_DBG: (no Dockerfile.runner)\n''

        printf ''GARALT_DBG: pyproject.toml (head):\n''

        head -30 pyproject.toml 2>/dev/null || printf ''GARALT_DBG: (no pyproject.toml)\n''

        printf ''GARALT_DBG: SERVER_OPENAI_API_KEY set=%s\n'' "${SERVER_OPENAI_API_KEY+yes}"

        printf ''GARALT_DBG: CLI_OPENAI_API_KEY set=%s\n'' "${CLI_OPENAI_API_KEY+yes}"'
    - name: Run compose test
      id: run_tests
      working-directory: backend
      run: 'docker compose -f compose.yml -f compose.ci.yml run test-runner

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
  pull_request_target:
    branches:
    - main
  schedule:
  - cron: 0 9 * * *
