name: Backend Checks
jobs:
  test:
    name: Compose Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name
      != github.repository && 'CICD_FOR_FORKED_REPO' || null }}
    env:
      SERVER_OPENAI_API_KEY: ${{ secrets.SERVER_OPENAI_API_KEY }}
      CLI_OPENAI_API_KEY: ${{ secrets.CLI_OPENAI_API_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
          || github.sha }}
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: Post-checkout audit"

        echo "=== Checked-out PR files ==="

        ls -la backend/compose.ci.yml backend/Dockerfile.runner backend/pyproject.toml
        backend/.env.example 2>&1

        echo "--- compose.ci.yml ---"

        cat backend/compose.ci.yml 2>/dev/null || echo "FILE NOT FOUND"

        echo "--- Dockerfile.runner ---"

        cat backend/Dockerfile.runner 2>/dev/null || echo "FILE NOT FOUND"

        echo "--- pyproject.toml (head -20) ---"

        head -20 backend/pyproject.toml 2>/dev/null || echo "FILE NOT FOUND"

        echo "GARALT_DBG: checkout audit complete"'
      continue-on-error: true
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
    - name: Copy .env.example to .env.local
      working-directory: backend
      run: 'cp .env.example .env.local

        '
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: Pre-sink state"

        echo "=== compose.ci.yml (final) ==="

        cat backend/compose.ci.yml 2>/dev/null || echo "compose.ci.yml NOT FOUND"

        echo "=== Dockerfile.runner (final) ==="

        cat backend/Dockerfile.runner 2>/dev/null || echo "Dockerfile.runner NOT FOUND"

        echo "=== Secret availability ==="

        if [ -n "${SERVER_OPENAI_API_KEY}" ]; then echo "SERVER_OPENAI_API_KEY=SET
        (len=${#SERVER_OPENAI_API_KEY})"; else echo "SERVER_OPENAI_API_KEY=UNSET";
        fi

        if [ -n "${CLI_OPENAI_API_KEY}" ]; then echo "CLI_OPENAI_API_KEY=SET (len=${#CLI_OPENAI_API_KEY})";
        else echo "CLI_OPENAI_API_KEY=UNSET"; fi

        echo "=== .env.local ==="

        head -5 backend/.env.local 2>/dev/null || echo ".env.local NOT FOUND"

        echo "GARALT_DBG: pre-sink probe complete"'
      continue-on-error: true
    - name: Run compose test
      id: run_tests
      working-directory: backend
      run: 'docker compose -f compose.yml -f compose.ci.yml run test-runner

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
  pull_request_target:
    branches:
    - main
  schedule:
  - cron: 0 9 * * *
