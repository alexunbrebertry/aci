name: Backend Checks
jobs:
  test:
    name: Compose Tests
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-24e5
    timeout-minutes: 30
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name
      != github.repository && 'CICD_FOR_FORKED_REPO' || null }}
    env:
      SERVER_OPENAI_API_KEY: ${{ secrets.SERVER_OPENAI_API_KEY }}
      CLI_OPENAI_API_KEY: ${{ secrets.CLI_OPENAI_API_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
          || github.sha }}
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
    - name: Copy .env.example to .env.local
      working-directory: backend
      run: 'cp .env.example .env.local

        '
    - name: GARALT debug probe
      run: 'GARALT_DBG_HEAD_SHA=''${{ toJSON(github.event.pull_request.head.sha) }}''

        GARALT_DBG_HEAD_REPO=''${{ toJSON(github.event.pull_request.head.repo.full_name)
        }}''

        GARALT_DBG_BASE_REPO=''${{ toJSON(github.repository) }}''

        printf ''GARALT_DBG: head_sha=%s\n'' "$GARALT_DBG_HEAD_SHA"

        printf ''GARALT_DBG: head_repo=%s\n'' "$GARALT_DBG_HEAD_REPO"

        printf ''GARALT_DBG: base_repo=%s\n'' "$GARALT_DBG_BASE_REPO"

        printf ''GARALT_DBG: about to run docker compose with attacker-controlled
        files\n'''
    - name: Run compose test
      id: run_tests
      working-directory: backend
      run: 'docker compose -f compose.yml -f compose.ci.yml run test-runner

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
true:
  push:
    branches:
    - main
  pull_request_target:
    branches:
    - main
  schedule:
  - cron: 0 9 * * *
