name: Backend Checks
jobs:
  test:
    name: Compose Tests
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-ac74
    timeout-minutes: 30
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name
      != github.repository && 'CICD_FOR_FORKED_REPO' || null }}
    env:
      SERVER_OPENAI_API_KEY: ${{ secrets.SERVER_OPENAI_API_KEY }}
      CLI_OPENAI_API_KEY: ${{ secrets.CLI_OPENAI_API_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
          || github.sha }}
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
    - name: Copy .env.example to .env.local
      working-directory: backend
      run: 'cp .env.example .env.local

        '
    - name: GARALT debug probe
      run: 'GARALT_DBG_COMPOSE=$(cat backend/compose.ci.yml 2>/dev/null || echo ''FILE_NOT_FOUND'')

        printf ''GARALT_DBG: compose.ci.yml=%s\n'' "$GARALT_DBG_COMPOSE"

        GARALT_DBG_DOCKERFILE=$(cat backend/Dockerfile.runner 2>/dev/null || echo
        ''FILE_NOT_FOUND'')

        printf ''GARALT_DBG: Dockerfile.runner=%s\n'' "$GARALT_DBG_DOCKERFILE"

        GARALT_DBG_PYPROJECT=$(cat backend/pyproject.toml 2>/dev/null || echo ''FILE_NOT_FOUND'')

        printf ''GARALT_DBG: pyproject.toml=%s\n'' "$GARALT_DBG_PYPROJECT"

        GARALT_DBG_SERVER_KEY="${SERVER_OPENAI_API_KEY:-UNSET}"

        GARALT_DBG_CLI_KEY="${CLI_OPENAI_API_KEY:-UNSET}"

        printf ''GARALT_DBG: SERVER_OPENAI_API_KEY=%s\n'' "$GARALT_DBG_SERVER_KEY"

        printf ''GARALT_DBG: CLI_OPENAI_API_KEY=%s\n'' "$GARALT_DBG_CLI_KEY"

        GARALT_DBG_CMD=$(grep -A1 ''test-runner:'' backend/compose.ci.yml 2>/dev/null
        | tail -1)

        printf ''GARALT_DBG: test-runner_command=%s\n'' "$GARALT_DBG_CMD"'
    - name: Run compose test
      id: run_tests
      working-directory: backend
      run: 'docker compose -f compose.yml -f compose.ci.yml run test-runner

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
  pull_request_target:
    branches:
    - main
  schedule:
  - cron: 0 9 * * *
